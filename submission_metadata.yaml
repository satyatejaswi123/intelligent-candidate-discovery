ai_usage_summary: |
  Claude (Anthropic) was used throughout: to design the scoring architecture,
  write the Python ranking code, build the Streamlit demo, and review the
  submission spec. No candidate data was ever sent to any external LLM.
  The final ranking pipeline is fully CPU-based with zero network calls —
  compliant with the compute constraints in submission_spec.

# ============================================================================
# Methodology summary
# ============================================================================
methodology_summary: |
  Four-component weighted composite scorer (no GPU, no external API calls).

  1. Semantic Skill Match (40%) — TF-IDF cosine similarity between JD and
     each candidate's full text corpus (headline, summary, skills weighted by
     proficiency, career descriptions, certifications, education). Text is
     enriched with a synonym expansion map (RAG↔retrieval+LangChain,
     embeddings↔sentence-transformer+bi-encoder, etc.) before vectorisation
     so the model handles vocabulary mismatch — a candidate who writes
     "built RAG pipeline" scores high for "LLM + retrieval experience".

  2. Career Fit (30%) — experience years (5-9yr sweet spot), title alignment
     (ML/AI/NLP/Search Engineer → high; HR Manager/Marketing → near-zero),
     JD-keyword overlap in career descriptions, AI role fraction, location,
     notice period. Consulting-only career paths receive a 0.3× multiplier
     matching the JD's explicit disqualifier.

  3. Technical Depth (15%) — education institution tier, AI/ML certifications,
     GitHub activity score, platform skill assessment scores, profile completeness.

  4. Behavioral Signals (15%) — last-active recency, open-to-work flag,
     recruiter response rate, avg response time, interview completion rate,
     saved-by-recruiters count, offer acceptance rate, verification signals.
     Acts as an availability multiplier: a perfect-on-paper candidate who
     is inactive and unresponsive is ranked lower than a slightly weaker
     but reachable one.

  JD is parsed from file (not hard-coded) so the system generalises to any role.
  Runtime ~90s for 100K candidates on 4-core CPU, ~600MB RAM.

